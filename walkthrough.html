<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="A personalized walkthrough for Karina Taveras — Real Estate in Miramar &amp; South Broward." />
<title>A walkthrough for Karina · Karina Taveras Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     PALETTE — Option D · Editorial Soft (matches demo page)
     ============================================================ */
  :root {
    --cream: #F6F1EC;
    --warm-white: #FBF8F4;
    --espresso: #14141A;
    --mocha: #2C2A33;
    --champagne: #D9A89B;
    --champagne-dark: #A06857;
    --champagne-light: #ECCFC4;
    --sand: #E5DDD3;
    --text-muted: #5A5358;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: rgba(255,255,255,0.86);
    background: var(--espresso);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  /* Subtle background warmth — barely-there blush gradient on the ink */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(217, 168, 155, 0.06), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(217, 168, 155, 0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 24px 64px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }

  /* ===== TOP WORDMARK ===== */
  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 26px;
    color: #fff;
    letter-spacing: 0.06em;
    white-space: nowrap;
    transition: opacity 0.3s ease;
    margin-bottom: 20px;
  }
  .wordmark .dot { color: var(--champagne); margin: 0 6px; }
  .wordmark:hover { opacity: 0.78; }

  /* ===== HEADER ===== */
  header.intro {
    text-align: center;
    margin-bottom: 20px;
    max-width: 520px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--champagne);
    font-weight: 500;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(34px, 5.5vw, 48px);
    line-height: 1.1;
    color: #fff;
    margin-top: 16px;
  }
  h1 em {
    font-style: italic;
    color: var(--champagne);
    font-weight: 300;
  }
  .lede {
    margin-top: 18px;
    font-size: 15px;
    color: rgba(255,255,255,0.72);
    line-height: 1.7;
  }

  /* ===== LOOM EMBED — portrait ratio ===== */
  .video-wrap {
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 24px 60px rgba(0,0,0,0.55),
      0 0 0 1px rgba(217, 168, 155, 0.08);
  }
  .video-aspect {
    position: relative;
    width: 100%;
    /* Portrait 9:16 → padding-bottom 177.78% */
    padding-bottom: 177.78%;
    height: 0;
  }
  .video-aspect iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* ===== CTA ===== */
  .cta-wrap {
    margin-top: 48px;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  .cta-eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--champagne);
    font-weight: 500;
    margin-bottom: 14px;
  }
  .cta-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 22px;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 28px;
  }
  .btn-primary {
    display: inline-block;
    background: var(--champagne);
    color: var(--espresso);
    padding: 18px 44px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    transition: background 0.3s ease, color 0.3s ease, transform 0.3s ease;
    border-radius: 0;
  }
  .btn-primary:hover {
    background: #fff;
    color: var(--espresso);
    transform: translateY(-2px);
  }
  .text-link {
    display: block;
    margin-top: 32px;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.6);
    border-bottom: none;
    transition: color 0.3s ease;
  }
  .text-link span {
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 2px;
    transition: border-color 0.3s ease;
  }
  .text-link:hover {
    color: var(--champagne);
  }
  .text-link:hover span {
    border-color: var(--champagne);
  }

  /* ===== FOOTER ===== */
  .foot {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 24px 40px;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.4);
  }
  .foot a { color: rgba(255,255,255,0.6); }
  .foot a:hover { color: var(--champagne); }

  /* ===== STICKY CTA BAR (Danny's brand layer) ===== */
  .sticky-cta-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    height: 64px;
    background: #F0EDE8;
    border-top: 1px solid rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
  }
  .sticky-cta-inner {
    max-width: 480px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .sticky-cta-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: #3A3530;
    white-space: nowrap;
  }
  .sticky-cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #151821;
    color: #F0EDE8;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.02em;
    padding: 11px 24px;
    border-radius: 2px;
    transition: background 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sticky-cta-btn .arrow {
    display: inline-block;
    transition: transform 0.3s ease;
  }
  .sticky-cta-btn:hover {
    background: #2C2A33;
    transform: translateY(-1px);
  }
  .sticky-cta-btn:hover .arrow {
    transform: translateX(3px);
  }

  /* Body padding so video isn't clipped behind the sticky bar */
  body {
    padding-bottom: 64px;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 640px) {
    body { padding-bottom: 60px; }
    .sticky-cta-bar { height: 60px; padding: 0 16px; }
    .sticky-cta-inner { gap: 12px; }
    .sticky-cta-label { font-size: 12px; }
    .sticky-cta-btn { padding: 10px 18px; font-size: 12px; }
    .wrap { padding: 24px 20px 48px; }
    .wordmark { font-size: 22px; margin-bottom: 18px; }
    header.intro { margin-bottom: 20px; }
    .video-wrap { max-width: 320px; }
    .cta-wrap { margin-top: 36px; }
    .cta-title { font-size: 19px; }
    .btn-primary { padding: 16px 32px; font-size: 11px; width: 100%; max-width: 320px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- Wordmark links to live demo -->
  <a href="https://karina-taveras-demo.vercel.app/" class="wordmark" aria-label="Visit the Karina Taveras demo site">
    Karina <span class="dot" aria-hidden="true">·</span> Taveras
  </a>

  <header class="intro">
    <span class="eyebrow">A personal walkthrough</span>
  </header>

  <!-- Loom embed: UI stripped per SOP -->
  <div class="video-wrap">
    <div class="video-aspect">
      <iframe
        src="https://www.loom.com/embed/13f1f5ba132249e7a83f246a8e826ac3?hide_owner=true&hide_share=true&hide_title=true&hideEmbedTopBar=true&hideLogo=true"
        frameborder="0"
        allowfullscreen
        title="A personalized walkthrough for Karina Taveras"></iframe>
    </div>
  </div>

  <div class="cta-wrap">
    <div class="cta-eyebrow">Ready to explore</div>
    <p class="cta-title">Have a look around the live site.</p>
    <a href="https://karina-taveras-demo.vercel.app/" class="btn-primary">View your demo</a>
    <a href="https://www.namnumdesign.co/" class="text-link" target="_blank" rel="noopener"><span>How this works</span></a>
  </div>

</div>

<footer class="foot">
  Designed for Karina Taveras &middot;
  <a href="https://karina-taveras-demo.vercel.app/">karina-taveras-demo.vercel.app</a>
</footer>

<aside class="sticky-cta-bar" aria-label="Book an introductory call">
  <div class="sticky-cta-inner">
    <span class="sticky-cta-label">Like what you see?</span>
    <a href="https://fantastical.app/Namnum/Intro-conversation" class="sticky-cta-btn" target="_blank" rel="noopener">
      Let&rsquo;s Talk <span class="arrow" aria-hidden="true">&rarr;</span>
    </a>
  </div>
</aside>

</body>
</html>
